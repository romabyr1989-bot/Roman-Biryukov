<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Parkinome</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <div class="left">
        <h2>Patient Data</h2>

        <input id="age" placeholder="Age">
        <input id="updrs" placeholder="UPDRS">
        <input id="moca" placeholder="MOCA">
        <input id="scopa" placeholder="SCOPA">
        <input id="hy" placeholder="Hoehn-Yahr">

        <h3>Biomarkers</h3>

        <input id="ndufa4l2" placeholder="NDUFA4L2">
        <input id="ndufs2" placeholder="NDUFS2">
        <input id="pink1" placeholder="PINK1">
        <input id="ppargc1a" placeholder="PPARGC1A">
        <input id="nlrp3" placeholder="NLRP3">
        <input id="il1b" placeholder="IL1B">
        <input id="s100a8" placeholder="S100A8">
        <input id="cxcl8" placeholder="CXCL8">

        <button onclick="send()">Predict</button>
    </div>

    <div class="right">
        <h2>Results</h2>

        <div class="card">ISP<div class="value" id="isp">-</div></div>
        <div class="card">Risk<div class="value" id="risk">-</div></div>
        <div class="card">Category<div class="value" id="category">-</div></div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
