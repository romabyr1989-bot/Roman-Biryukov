<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parkinome Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-1: #f3f1ea;
  --bg-2: #d9e4dd;
  --panel: rgba(255, 255, 255, 0.78);
  --panel-strong: rgba(255, 255, 255, 0.92);
  --text: #112217;
  --muted: #4f5f54;
  --line: #cad5cd;
  --accent: #0f6b4a;
  --accent-soft: #e2f2eb;
  --warn: #b36a09;
  --high: #a22f2f;
  --ok: #1e7a3f;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Space Grotesk", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 12% 18%, #ffffffb8 0%, transparent 42%),
    radial-gradient(circle at 88% 82%, #eef8f1 0%, transparent 50%),
    linear-gradient(135deg, var(--bg-1), var(--bg-2));
}

.page {
  width: 100%;
  min-height: 100vh;
  margin: 0;
  padding: 16px;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.brand {
  font-size: clamp(22px, 4.5vw, 34px);
  font-weight: 700;
  letter-spacing: 0.02em;
}

.role-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  backdrop-filter: blur(6px);
}

select {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 7px 12px;
  font: inherit;
  background: #fff;
  color: var(--text);
}

.role-pill {
  padding: 6px 11px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 14px;
  flex: 1;
  min-height: 0;
}

.panel {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--panel);
  backdrop-filter: blur(7px);
  padding: 16px;
  box-shadow: 0 10px 30px rgba(17, 34, 23, 0.08);
  height: 100%;
}

.hidden { display: none !important; }

h2 {
  margin: 0 0 10px;
  font-size: clamp(18px, 3.5vw, 24px);
}

p {
  margin: 0;
  color: var(--muted);
  line-height: 1.5;
}

.form-grid {
  margin-top: 12px;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.field label {
  display: block;
  font-size: 12px;
  margin-bottom: 4px;
  color: var(--muted);
}

.field input,
textarea {
  width: 100%;
  border: 1px solid var(--line);
  background: var(--panel-strong);
  border-radius: 12px;
  padding: 10px;
  font: inherit;
  color: var(--text);
}

textarea {
  min-height: 240px;
  resize: vertical;
}

.actions {
  margin-top: 12px;
  display: flex;
  gap: 8px;
}

button {
  border: none;
  border-radius: 12px;
  padding: 10px 14px;
  font: inherit;
  font-weight: 600;
  cursor: pointer;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-ghost {
  background: #fff;
  color: var(--text);
  border: 1px solid var(--line);
}

.result {
  display: grid;
  gap: 10px;
}

.metric {
  padding: 12px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: var(--panel-strong);
}

.metric .k {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.metric .v {
  margin-top: 2px;
  font-size: 24px;
  font-weight: 700;
}

.v.low { color: var(--ok); }
.v.mid { color: var(--warn); }
.v.high { color: var(--high); }

.code {
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: #f8fbf9;
  padding: 10px;
  min-height: 72px;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 13px;
}

.notice {
  margin-top: 10px;
  border-radius: 12px;
  padding: 10px;
  font-size: 13px;
  background: #fff8e8;
  border: 1px solid #ead7aa;
  color: #7a5b10;
}

@media (max-width: 920px) {
  .grid { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">Parkinome Console</div>
    </div>

    <div id="doctorUI" class="grid">
      <section class="panel">
        <h2>Single Patient Prediction</h2>
        <p>Заполни любое количество полей. Модель сама учтёт доступные группы признаков.</p>

        <div class="form-grid">
          <div class="field"><label>Age (30-90)</label><input id="age" type="number" min="30" max="90" step="1" placeholder="e.g. 67"></div>
          <div class="field"><label>UPDRS III (0-132)</label><input id="updrs" type="number" min="0" max="132" step="1" placeholder="e.g. 38"></div>
          <div class="field"><label>MOCA (0-30)</label><input id="moca" type="number" min="0" max="30" step="1" placeholder="e.g. 22"></div>
          <div class="field"><label>SCOPA AUT (0-69)</label><input id="scopa" type="number" min="0" max="69" step="1" placeholder="e.g. 24"></div>
          <div class="field"><label>Hoehn-Yahr (1-5)</label><input id="hy" type="number" min="1" max="5" step="0.1" placeholder="e.g. 2.5"></div>
          <div class="field"><label>NDUFA4L2 (-10..10)</label><input id="ndufa4l2" type="number" min="-10" max="10" step="0.01" placeholder="e.g. 4.1"></div>
          <div class="field"><label>NDUFS2 (-10..10)</label><input id="ndufs2" type="number" min="-10" max="10" step="0.01" placeholder="e.g. 3.8"></div>
          <div class="field"><label>PINK1 (-10..10)</label><input id="pink1" type="number" min="-10" max="10" step="0.01" placeholder="e.g. 2.2"></div>
          <div class="field"><label>PPARGC1A (-10..10)</label><input id="ppargc1a" type="number" min="-10" max="10" step="0.01" placeholder="e.g. 3.4"></div>
          <div class="field"><label>NLRP3 (-10..10)</label><input id="nlrp3" type="number" min="-10" max="10" step="0.01" placeholder="e.g. 6.1"></div>
          <div class="field"><label>IL1B (-10..10)</label><input id="il1b" type="number" min="-10" max="10" step="0.01" placeholder="e.g. 5.2"></div>
          <div class="field"><label>S100A8 (-10..10)</label><input id="s100a8" type="number" min="-10" max="10" step="0.01" placeholder="e.g. 4.9"></div>
          <div class="field"><label>CXCL8 (-10..10)</label><input id="cxcl8" type="number" min="-10" max="10" step="0.01" placeholder="e.g. 5.6"></div>
        </div>

        <div class="actions">
          <button id="btnPredict" type="button" class="btn-primary">Run Prediction</button>
          <button id="btnClear" type="button" class="btn-ghost">Clear</button>
        </div>
      </section>

      <aside class="panel">
        <h2>Result</h2>
        <div class="result">
          <div class="metric">
            <div class="k">Risk Probability</div>
            <div id="risk" class="v">-</div>
          </div>
          <div class="metric">
            <div class="k">Category</div>
            <div id="category" class="v">-</div>
          </div>
          <div class="metric">
            <div class="k">Confidence</div>
            <div id="confidence" class="v">-</div>
          </div>
          <div class="metric">
            <div class="k">ISP</div>
            <div id="isp" class="v">-</div>
          </div>
        </div>
        <div id="doctorError" class="notice hidden"></div>
      </aside>
    </div>

    <section id="researchUI" class="panel hidden">
      <h2>Batch Mode</h2>
      <p>Вставь JSON-массив пациентов и запусти массовый расчёт.</p>
      <div class="actions">
        <button id="btnBatchRun" type="button" class="btn-primary">Run Batch</button>
        <button id="btnBatchExample" type="button" class="btn-ghost">Insert Example</button>
      </div>
      <div style="margin-top:10px">
        <textarea id="batch" placeholder='[{"age":65,"updrs_iii":31},{"age":71,"moca":20,"nlrp3":7.2}]'></textarea>
      </div>
      <div id="out" class="code">-</div>
    </section>

  </div>

<script>
(() => {
  let currentToken = "token_admin";
  const $ = (id) => document.getElementById(id);

  function n(v) {
    if (v === '' || v === null || v === undefined) return undefined;
    const x = Number(v);
    return Number.isFinite(x) ? x : undefined;
  }

  function applyRole(role) {
    $("doctorUI").classList.add("hidden");
    $("researchUI").classList.add("hidden");

    if (role === "doctor") $("doctorUI").classList.remove("hidden");
    if (role === "researcher") $("researchUI").classList.remove("hidden");
    if (role === "admin") {
      $("doctorUI").classList.remove("hidden");
      $("researchUI").classList.remove("hidden");
    }
  }

  function showDoctorError(msg) {
    const e = $("doctorError");
    e.innerText = msg;
    e.classList.remove("hidden");
  }

  function buildDoctorPayload() {
    // Отправляем только заполненные поля, чтобы сервер корректно определял доступные группы.
    const raw = {
      age: n($("age").value),
      updrs_iii: n($("updrs").value),
      moca: n($("moca").value),
      scopa_aut: n($("scopa").value),
      hoehn_yahr: n($("hy").value),
      ndufa4l2: n($("ndufa4l2").value),
      ndufs2: n($("ndufs2").value),
      pink1: n($("pink1").value),
      ppargc1a: n($("ppargc1a").value),
      nlrp3: n($("nlrp3").value),
      il1b: n($("il1b").value),
      s100a8: n($("s100a8").value),
      cxcl8: n($("cxcl8").value)
    };
    return Object.fromEntries(Object.entries(raw).filter(([, v]) => v !== undefined));
  }

  function validatePayload(payload) {
    // Клиентская валидация повторяет диапазоны сервера для быстрого отклика в интерфейсе.
    const checks = [
      ["age", 30, 90],
      ["updrs_iii", 0, 132],
      ["moca", 0, 30],
      ["scopa_aut", 0, 69],
      ["hoehn_yahr", 1, 5],
      ["ndufa4l2", -10, 10],
      ["ndufs2", -10, 10],
      ["pink1", -10, 10],
      ["ppargc1a", -10, 10],
      ["nlrp3", -10, 10],
      ["il1b", -10, 10],
      ["s100a8", -10, 10],
      ["cxcl8", -10, 10]
    ];

    for (const [key, min, max] of checks) {
      if (payload[key] === undefined) continue;
      if (payload[key] < min || payload[key] > max) {
        throw new Error(`${key} must be in range [${min}, ${max}]`);
      }
    }
  }

  function classByRisk(v) {
    if (v < 0.33) return "low";
    if (v < 0.66) return "mid";
    return "high";
  }

  function clearDoctorForm() {
    ["age","updrs","moca","scopa","hy","ndufa4l2","ndufs2","pink1","ppargc1a","nlrp3","il1b","s100a8","cxcl8"]
      .forEach((id) => { $(id).value = ""; });
    $("risk").innerText = "-";
    $("category").innerText = "-";
    $("confidence").innerText = "-";
    $("isp").innerText = "-";
    $("doctorError").classList.add("hidden");
  }

  async function loadRole() {
    // Интерфейс по умолчанию открывает полный доступ; /me может переопределить поведение.
    const fallbackRole = "admin";
    applyRole(fallbackRole);

    try {
      const r = await fetch("/me", { headers: { Authorization: "Bearer " + currentToken } });
      const data = await r.json();
      const role = data.role || "none";
      if (role !== "none") {
        applyRole(role);
      }
    } catch (_) {
      /* Оставляем роль по умолчанию, если /me недоступен. */
    }
  }

  async function predict() {
    $("doctorError").classList.add("hidden");
    try {
      const payload = buildDoctorPayload();
      if (Object.keys(payload).length === 0) {
        throw new Error("Fill at least one input field before prediction.");
      }
      validatePayload(payload);

      const r = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + currentToken },
        body: JSON.stringify(payload)
      });
      const txt = await r.text();
      if (!r.ok) throw new Error(txt || ("HTTP " + r.status));
      const res = JSON.parse(txt);

      const rp = Number(res.risk_probability);
      $("risk").className = "v " + classByRisk(rp);
      $("category").className = "v " + classByRisk(rp);
      $("risk").innerText = Number.isFinite(rp) ? (rp * 100).toFixed(1) + "%" : "-";
      $("category").innerText = res.category || "-";
      $("confidence").innerText = typeof res.confidence === "number" ? res.confidence.toFixed(2) : "-";
      $("isp").innerText = typeof res.isp === "number" ? res.isp.toFixed(3) : "-";
    } catch (err) {
      showDoctorError("Prediction failed: " + err.message);
    }
  }

  function setBatchExample() {
    $("batch").value = JSON.stringify([
      { age: 65, updrs_iii: 31, moca: 23, hoehn_yahr: 2 },
      { age: 71, updrs_iii: 48, nlrp3: 7.2, il1b: 6.4, cxcl8: 6.8 }
    ], null, 2);
  }

  async function runBatch() {
    try {
      const r = await fetch("/batch", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + currentToken },
        body: $("batch").value
      });
      const txt = await r.text();
      if (!r.ok) throw new Error(txt || ("HTTP " + r.status));
      $("out").innerText = txt;
    } catch (err) {
      $("out").innerText = "Batch failed: " + err.message;
    }
  }

  $("btnPredict")?.addEventListener("click", predict);
  $("btnClear")?.addEventListener("click", clearDoctorForm);
  $("btnBatchRun")?.addEventListener("click", runBatch);
  $("btnBatchExample")?.addEventListener("click", setBatchExample);

  loadRole();
})();
</script>
</body>
</html>
