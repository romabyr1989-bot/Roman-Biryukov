<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Parkinome</title>
<style>
body{font-family:-apple-system;background:#f5f5f5;margin:0;}
.top{background:#000;color:#fff;padding:10px;}
.container{display:flex;height:90vh;}
.left{width:50%;padding:20px;}
.right{width:50%;padding:20px;background:#fff;}
.hidden{display:none;}
.low{color:green;}
.mid{color:orange;}
.high{color:red;}
</style>
</head>

<body>

<div class="top">
Role:
<select id="token" onchange="loadRole()">
<option value="token_doctor">Doctor</option>
<option value="token_research">Researcher</option>
<option value="token_admin">Admin</option>
</select>
<span id="roleLabel"></span>
</div>

<div id="doctorUI" class="container">
<div class="left">
<input id="age" placeholder="Age"><br><br>
<input id="updrs" placeholder="UPDRS"><br><br>
<button onclick="predict()">Predict</button>
</div>
<div class="right">
<div id="risk">-</div>
<div id="category">-</div>
</div>
</div>

<div id="researchUI" class="container hidden">
<textarea id="batch"></textarea>
<button onclick="runBatch()">Run batch</button>
<pre id="out"></pre>
</div>

<div id="adminUI" class="container hidden">
<h2>Admin panel</h2>
</div>

<script>

let currentToken = "token_doctor";

function loadRole(){

    currentToken = token.value;

    fetch('/me',{
        headers:{'Authorization':'Bearer ' + currentToken}
    })
    .then(r=>r.json())
    .then(data=>{
        roleLabel.innerText = " (" + data.role + ")";
        applyRole(data.role);
    });
}

function applyRole(role){

    doctorUI.classList.add("hidden");
    researchUI.classList.add("hidden");
    adminUI.classList.add("hidden");

    if(role==="doctor") doctorUI.classList.remove("hidden");
    if(role==="researcher") researchUI.classList.remove("hidden");
    if(role==="admin") adminUI.classList.remove("hidden");
}

function predict(){

    let data = {
        age:+age.value || undefined,
        updrs_iii:+updrs.value || undefined
    };

    fetch('/predict',{
        method:'POST',
        headers:{
            'Content-Type':'application/json',
            'Authorization':'Bearer ' + currentToken
        },
        body:JSON.stringify(data)
    })
    .then(r=>r.json())
    .then(res=>{
        let rsk = res.risk_probability;

        risk.innerText = (rsk*100).toFixed(1)+"%";
        category.innerText = res.category;

        risk.className="";
        if(rsk<0.33) risk.classList.add("low");
        else if(rsk<0.66) risk.classList.add("mid");
        else risk.classList.add("high");
    });
}

function runBatch(){

    fetch('/batch',{
        method:'POST',
        headers:{
            'Content-Type':'application/json',
            'Authorization':'Bearer ' + currentToken
        },
        body:batch.value
    })
    .then(r=>r.text())
    .then(d=>out.innerText=d);
}

loadRole();

</script>

</body>
</html>
